<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c4a6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8860b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#daa520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg2)"/>

  <!-- Water reflection -->
  <rect x="0" y="460" width="800" height="140" fill="url(#water)"/>

  <!-- Tower silhouettes with sea view -->
  <rect x="200" y="200" width="55" height="260" fill="#0a1628" opacity="0.5"/>
  <rect x="270" y="160" width="65" height="300" fill="#0a1628" opacity="0.6"/>
  <rect x="350" y="120" width="75" height="340" fill="#0a1628" opacity="0.7"/>
  <rect x="440" y="150" width="70" height="310" fill="#0a1628" opacity="0.65"/>
  <rect x="525" y="190" width="60" height="270" fill="#0a1628" opacity="0.55"/>

  <!-- Windows with lights -->
  <g fill="#38bdf8" opacity="0.4">
    <rect x="360" y="140" width="10" height="10"/>
    <rect x="380" y="140" width="10" height="10"/>
    <rect x="400" y="140" width="10" height="10"/>
    <rect x="360" y="160" width="10" height="10"/>
    <rect x="380" y="160" width="10" height="10"/>
    <rect x="400" y="160" width="10" height="10"/>
    <rect x="360" y="180" width="10" height="10"/>
    <rect x="380" y="180" width="10" height="10"/>
    <rect x="400" y="180" width="10" height="10"/>
  </g>

  <!-- Singapore skyline in distance -->
  <g fill="#64748b" opacity="0.3">
    <rect x="600" y="380" width="20" height="80"/>
    <rect x="630" y="350" width="25" height="110"/>
    <rect x="665" y="370" width="18" height="90"/>
    <rect x="690" y="390" width="22" height="70"/>
    <rect x="720" y="360" width="30" height="100"/>
    <rect x="760" y="380" width="20" height="80"/>
  </g>

  <!-- R&F Logo area -->
  <rect x="300" y="480" width="200" height="60" rx="8" fill="url(#gold2)" opacity="0.9"/>
  <text x="400" y="520" text-anchor="middle" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700">R&amp;F</text>

  <!-- Main text -->
  <text x="400" y="360" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="600">Princess Cove</text>
  <text x="400" y="400" text-anchor="middle" fill="#38bdf8" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="500">Phase 2 - Seine Region</text>
  <text x="400" y="435" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="16" opacity="0.7">Panoramic Sea Views • Sky Lounge • Yacht Club</text>

  <!-- Limited units badge -->
  <rect x="280" y="30" width="240" height="40" rx="20" fill="#f59e0b"/>
  <text x="400" y="57" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">LIMITED UNITS AVAILABLE</text>
</svg>
