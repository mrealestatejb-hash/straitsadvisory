<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#27272a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3f3f46;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8860b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#daa520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg3)"/>

  <!-- Blueprint style grid -->
  <g stroke="#52525b" stroke-width="1" opacity="0.3">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>

  <!-- Placeholder tower outlines (blueprint style) -->
  <g stroke="#71717a" stroke-width="2" fill="none" stroke-dasharray="10,5" opacity="0.5">
    <rect x="280" y="180" width="60" height="250"/>
    <rect x="360" y="140" width="80" height="290"/>
    <rect x="460" y="200" width="55" height="230"/>
  </g>

  <!-- Question marks for unknown -->
  <text x="320" y="310" text-anchor="middle" fill="#71717a" font-family="system-ui, -apple-system, sans-serif" font-size="48" opacity="0.4">?</text>
  <text x="400" y="290" text-anchor="middle" fill="#71717a" font-family="system-ui, -apple-system, sans-serif" font-size="48" opacity="0.4">?</text>
  <text x="487" y="320" text-anchor="middle" fill="#71717a" font-family="system-ui, -apple-system, sans-serif" font-size="48" opacity="0.4">?</text>

  <!-- R&F Logo area -->
  <rect x="300" y="480" width="200" height="60" rx="8" fill="url(#gold3)" opacity="0.9"/>
  <text x="400" y="520" text-anchor="middle" fill="#18181b" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700">R&amp;F</text>

  <!-- Main text -->
  <text x="400" y="380" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="600">Princess Cove</text>
  <text x="400" y="420" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="500">Phase 3</text>
  <text x="400" y="455" text-anchor="middle" fill="#71717a" font-family="system-ui, -apple-system, sans-serif" font-size="16">Details to be announced</text>

  <!-- Coming soon badge -->
  <rect x="300" y="30" width="200" height="40" rx="20" fill="#3b82f6"/>
  <text x="400" y="57" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">COMING SOON</text>
</svg>
