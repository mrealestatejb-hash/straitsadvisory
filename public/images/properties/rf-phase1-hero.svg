<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8860b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#daa520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg1)"/>

  <!-- Tower silhouettes -->
  <rect x="250" y="180" width="60" height="280" fill="#0a1628" opacity="0.6"/>
  <rect x="320" y="140" width="70" height="320" fill="#0a1628" opacity="0.7"/>
  <rect x="400" y="100" width="80" height="360" fill="#0a1628" opacity="0.8"/>
  <rect x="490" y="160" width="65" height="300" fill="#0a1628" opacity="0.6"/>

  <!-- Windows pattern -->
  <g fill="#e94560" opacity="0.3">
    <rect x="410" y="120" width="8" height="8"/>
    <rect x="430" y="120" width="8" height="8"/>
    <rect x="450" y="120" width="8" height="8"/>
    <rect x="410" y="140" width="8" height="8"/>
    <rect x="430" y="140" width="8" height="8"/>
    <rect x="450" y="140" width="8" height="8"/>
    <rect x="410" y="160" width="8" height="8"/>
    <rect x="430" y="160" width="8" height="8"/>
    <rect x="450" y="160" width="8" height="8"/>
  </g>

  <!-- R&F Logo area -->
  <rect x="300" y="480" width="200" height="60" rx="8" fill="url(#gold1)" opacity="0.9"/>
  <text x="400" y="520" text-anchor="middle" fill="#1a1a2e" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700">R&amp;F</text>

  <!-- Main text -->
  <text x="400" y="380" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="600">Princess Cove</text>
  <text x="400" y="420" text-anchor="middle" fill="#daa520" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500">Phase 1</text>
  <text x="400" y="455" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="16" opacity="0.7">7 Towers • 33 Layouts • Freehold</text>

  <!-- Sold out badge -->
  <rect x="300" y="30" width="200" height="40" rx="20" fill="#6b7280"/>
  <text x="400" y="57" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">SOLD OUT</text>
</svg>
